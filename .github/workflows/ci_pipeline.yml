name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    services:
        mongo:
          image: mongo:6
          ports:
            - 27017:27017
    env:
      PORT: ${{secrets.PORT}}
      MONGO_URI: ${{secrets.MONGO_URI}}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/my-node-app:latest .

      - name: Run API using Docker
        run: |
          docker run -d \
          -p $PORT:$PORT \
          --env PORT=$PORT \
          --env MONGO_URI=$MONGO_URI \
          --name users-container \
          ${{ secrets.DOCKER_USERNAME }}/my-node-app:latest

      - name: Wait for API
        run: sleep 10

      - name: Run test
        run: pytest allTest.py -v

      - name: Push Docker Image
        if: success()
        run: docker push ${{ secrets.DOCKER_USERNAME }}/my-node-app:latest